<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether • AI Analytics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root { --accent: #00f0ff; }

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 50% 20%, #0a0f2c 0%, #05081a 80%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
}

.dashboard {
    width: 100%;
    max-width: 1280px;
    height: 720px;
    background: rgba(10, 15, 44, 0.95);
    border-radius: 28px;
    box-shadow: 0 40px 90px -20px rgba(0, 240, 255, 0.3),0 0 0 1px rgba(255,255,255,0.1) inset;
    overflow: hidden;
    display: flex;
    backdrop-filter: blur(20px);
}

/* サイドバー */
.sidebar {
    width: 240px;
    background: rgba(8, 12, 32, 0.98);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-right: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    transform: translateX(0);
}
.sidebar.closed { transform: translateX(-100%); }

.logo { display:flex;align-items:center;gap:12px;padding:0 12px 28px;font-size:23px;font-weight:700;color:#fff;letter-spacing:-0.8px; }
.logo-icon { width:36px;height:36px;background:linear-gradient(135deg,#00f0ff,#0099ff);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,240,255,0.6); }

.nav-item { display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:14px;color:#94a3c0;font-size:15px;font-weight:500;transition: all 0.2s; cursor:pointer; }
.nav-item:hover { background: rgba(0,240,255,0.15); color:white; }
.nav-item.active { background: rgba(0,240,255,0.25); color:white; box-shadow:0 4px 15px rgba(0,240,255,0.2); }
.nav-icon { width:24px;height:24px; }

.users-section { margin-top:auto; padding-top:32px; border-top:1px solid rgba(255,255,255,0.08); }
.user-item { display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px; }
.avatar { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:600; }

/* 閉じるボタン */
.close-btn { position:absolute;top:24px;right:20px;width:32px;height:32px;background:none;border:none;font-size:28px;color:#94a3c0;cursor:pointer;display:none;z-index:10; }
.sidebar:not(.closed) .close-btn { display:block; }

/* メイン */
.main { flex:1;display:flex;flex-direction:column; }
.top-bar { height:76px;background:rgba(10,15,44,0.9);border-bottom:1px solid rgba(255,255,255,0.08);padding:0 24px;display:flex;align-items:center;gap:20px; }
.hamburger { width:36px;height:36px;background:none;border:none;font-size:28px;color:#94a3c0;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.search { flex:1;max-width:440px;background:rgba(255,255,255,0.08);border-radius:9999px;padding:12px 24px;display:flex;align-items:center;gap:12px;color:#94a3c0;font-size:15.5px; }
.top-right { display:flex;align-items:center;gap:24px; }
.avatar-top { width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#00f0ff,#0099ff);display:flex;align-items:center;justify-content:center;color:#05081a;font-weight:700;font-size:15px; }

/* コンテンツ */
.content { flex:1;padding:32px;overflow-y:auto; }
.header-title { font-size:26px;font-weight:700;color:white;margin-bottom:4px; }
.stats-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:36px; }
.stat-card { background: rgba(255,255,255,0.07); border-radius:20px;padding:24px;border:1px solid rgba(255,255,255,0.1); }
.stat-label { font-size:14px;color:#94a3c0; }
.stat-value { font-size:32px;font-weight:700;color:white;margin-top:8px; }

.charts { display:grid;grid-template-columns:1fr 1fr;gap:28px; }
.chart-card { background: rgba(255,255,255,0.07); border-radius:20px;padding:28px;border:1px solid rgba(255,255,255,0.1); }
.chart-title { font-size:16px;font-weight:600;color:white;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center; }
.donut-container { position:relative;width:220px;height:220px;margin:0 auto; }
.bar-svg { width:100%;height:270px; }
.legend { display:flex;flex-wrap:wrap;gap:18px;margin-top:20px;font-size:14px; }
.legend-item { display:flex;align-items:center;gap:8px; }
.legend-dot { width:12px;height:12px;border-radius:50%; }

</style>
</head>

<script>
const sidebar = document.getElementById('sidebar');
function toggleSidebar(){ sidebar.classList.toggle('closed'); }
function closeSidebar(){ sidebar.classList.add('closed'); }

// ドーナツチャート動的更新
function updateDonut(){
    const normal = Math.floor(Math.random()*50)+30;
    const evolve = 50
function updateDonut(){
    const normal = Math.floor(Math.random()*50)+30; // 正常稼働の数
    const evolve = 50 - normal; // 残りが進化中と仮定

    const total = 50; // 合計値（例: 50AI）
    const normalCircle = document.querySelector('.donut-container circle:nth-child(2)');
    const evolveCircle = document.querySelector('.donut-container circle:nth-child(3)');
    const label = document.querySelector('.donut-container text');

    const dashArray = 2 * Math.PI * 80; // r=80 の円周
    const normalOffset = dashArray * (1 - normal / total);
    const evolveOffset = dashArray * (1 - (normal + evolve) / total);

    normalCircle.setAttribute('stroke-dasharray', `${dashArray} ${dashArray}`);
    normalCircle.setAttribute('stroke-dashoffset', normalOffset);

    evolveCircle.setAttribute('stroke-dasharray', `${dashArray} ${dashArray}`);
    evolveCircle.setAttribute('stroke-dashoffset', normalOffset + evolveOffset);

    label.textContent = `${Math.round((normal/total)*100)}%`;
}

// 初回呼び出しと5秒ごとの更新
updateDonut();
setInterval(updateDonut, 5000);
